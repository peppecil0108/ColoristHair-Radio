<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Colorist_Hair</title>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #121212;
  color: white;
  text-align: center;
  padding: 10px;
  padding-bottom: 140px;
}

header {
  font-size: 22px;
  font-weight: bold;
  margin: 20px 0;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1000px;
  margin: 0 auto;
}

.card {
  background: #1e1e1e;
  border-radius: 10px;
  padding: 15px;
  margin: 6px;
  width: 140px;
  cursor: pointer;
  font-size: 14px;
  border: 2px solid transparent;
}

.card:active {
  opacity: 0.7;
}

.card.active {
  border-color: #1db954;
  color: #1db954;
}

.player {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #181818;
  padding: 10px;
  box-sizing: border-box;
}

#nowPlaying {
  font-size: 14px;
  margin-bottom: 5px;
}

audio {
  width: 95%;
}
</style>

</head>
<body>

<header>🎧 Radio Colorist_Hair 🎧</header>

<div class="container" id="radioList"></div>

<div class="player">
  <div id="nowPlaying">Seleziona una radio</div>
  <audio id="audioPlayer" controls></audio>
</div>

<script>

var radios = [
  {name: "RDS", url: "https://icstream.rds.radio/rds"},
  {name: "RTL 102.5", url: "https://streamingv2.shoutcast.com/rtl-1025"},
  {name: "Radio 105", url: "https://icecast.unitedradio.it/Radio105.mp3"},
  {name: "Radio Kiss Kiss", url: "https://kisskiss.fluidstream.eu/KissKiss.mp3"},
  {name: "Radio Deejay", url: "https://4c4b867c89244861ac216426883d1ad0.msvdn.net/radiodeejay/radiodeejay/master_ma.m3u8"},
  {name: "Radio m2o", url: "https://4c4b867c89244861ac216426883d1ad0.msvdn.net/radiom2o/radiom2o/master_ma.m3u8"},
  {name: "Virgin Radio", url: "https://icecast.unitedradio.it/Virgin.mp3"},
  {name: "R101", url: "https://icecast.unitedradio.it/r101_mp3"}
];

var container = document.getElementById("radioList");
var player = document.getElementById("audioPlayer");
var nowPlaying = document.getElementById("nowPlaying");

function renderRadios() {
  container.innerHTML = "";

  for (var i = 0; i < radios.length; i++) {
    (function(radio) {

      var card = document.createElement("div");
      card.className = "card";
      card.innerHTML = radio.name;

      card.onclick = function() {
        playRadio(radio, card);
      };

      container.appendChild(card);

    })(radios[i]);
  }
}

function playRadio(radio, card) {

  var cards = document.getElementsByClassName("card");
  for (var i = 0; i < cards.length; i++) {
    cards[i].className = "card";
  }

  card.className = "card active";
  nowPlaying.innerHTML = "In riproduzione: " + radio.name;

  player.pause();
  player.src = "";

  player.src = radio.url;
  player.load();

  var playPromise = player.play();

  if (playPromise !== undefined) {
    playPromise.catch(function(error) {
      console.log("Errore riproduzione:", error);
    });
  }
}

renderRadios();

</script>

</body>
</html>
